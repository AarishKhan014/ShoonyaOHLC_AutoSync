name: Automate Shoonya Data Download

on:
  schedule:
    # Monday to Friday at 4:15 PM IST
    # 4:15 PM IST = 10:45 UTC
    - cron: '45 10 * * 1-5'
  
  workflow_dispatch: # Allows manual trigger for testing

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browser + Dependencies
        run: |
          python -m playwright install chromium --with-deps

      - name: Create Google Service Account File
        run: |
          echo '${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}' > service_account.json
          ls -l service_account.json
          echo "Service account file created successfully"

      - name: Print current time (for debugging)
        run: |
          echo "Current UTC time : $(date -u)"
          echo "Current IST time : $(TZ=Asia/Kolkata date)"

      - name: Run ohlc_to_drive.py
        env:
          SHOONYA_USER: ${{ secrets.SHOONYA_USER }}
          SHOONYA_PWD: ${{ secrets.SHOONYA_PWD }}
          SHOONYA_QR: ${{ secrets.SHOONYA_QR }}
          SHOONYA_APP_KEY: ${{ secrets.SHOONYA_APP_KEY }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          PYTHONUNBUFFERED: 1
        run: python ohlc_to_drive.py
